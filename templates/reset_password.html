<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - VelWolef</title>

    <style>
        body {
            background: #0b0f1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #111827;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: #ff4d4d;
            margin-bottom: 10px;
        }

        p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: none;
            background: #1f2937;
            color: white;
        }

        input:focus {
            outline: none;
            border: 1px solid #ff4d4d;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #cc0000;
        }

        .messages {
            margin-top: 15px;
            font-size: 13px;
            color: #ff4d4d;
        }

        .success {
            color: #00ff99;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Réinitialiser mot de passe</h1>

    <p>Choisis un nouveau mot de passe sécurisé.</p>

    <form method="POST">
        <input type="password" name="password" placeholder="Nouveau mot de passe" required>
        <input type="password" name="confirm_password" placeholder="Confirmer mot de passe" required>

        <button type="submit">Mettre à jour</button>
    </form>

    <div class="messages">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div>{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

</div>

</body>
</html>
