<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mot de passe oublié - VelWolef</title>

    <style>
        body {
            background: #0b0f1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #111827;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: #00ff99;
            margin-bottom: 10px;
        }

        p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: none;
            background: #1f2937;
            color: white;
        }

        input:focus {
            outline: none;
            border: 1px solid #00ff99;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00ff99;
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00cc77;
        }

        .messages {
            margin-top: 15px;
            font-size: 13px;
            color: #ff4d4d;
        }

        .back {
            margin-top: 20px;
            text-align: center;
        }

        .back a {
            color: #00ff99;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Mot de passe oublié</h1>

    <p>Entre ton email pour recevoir un lien de réinitialisation.</p>

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <button type="submit">Envoyer le lien</button>
    </form>

    <div class="messages">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div>{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="back">
        <a href="{{ url_for('auth.login', lang_code=session.get('lang', 'fr')) }}">
            ← Retour connexion
        </a>
    </div>
</div>

</body>
</html>
