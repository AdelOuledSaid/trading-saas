        </span>
        <span style="display:flex; flex-direction:column; line-height:1;">

            <span style="font-size:11px; color:#94a3b8; font-weight:700; margin-top:4px;">Signals Platform</span>
        </span>
    </a>

    <div class="nav-links">
        <a href="{{ url_for('home') }}">Accueil</a>
        <a href="{{ url_for('pricing') }}">Offres</a>

        {% if current_user.is_authenticated %}
            <a href="{{ url_for('dashboard') }}">Dashboard</a>

        <span></span>
        <span></span>
        <span></span>

<div id="mobileMenu" class="mobile-menu">
    <a href="{{ url_for('home') }}">Accueil</a>
    <a href="{{ url_for('pricing') }}">Offres</a>

    {% if current_user.is_authenticated %}
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('logout') }}" class="logout-btn">Déconnexion</a>
    {% else %}
        <a href="{{ url_for('login') }}">Connexion</a>
        <a href="{{ url_for('register') }}" class="cta-btn" style="text-align:center;">Créer un compte</a>
    {% endif %}
</div>

<script>
function toggleMobileMenu(el) {
    el.classList.toggle("active");
    document.getElementById("mobileMenu").classList.toggle("active");
}
</script>
