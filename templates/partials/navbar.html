<nav class="navbar">
    <a href="{{ url_for('home') }}" class="logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="ApexSignals">
        <span>ApexSignals</span>
    </a>

    <div class="nav-links">
        <a href="{{ url_for('home') }}">Accueil</a>
        <a href="{{ url_for('pricing') }}">Offres</a>

        {% if current_user.is_authenticated %}
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('logout') }}" class="logout-btn">Déconnexion</a>
        {% else %}
            <a href="{{ url_for('login') }}">Connexion</a>
            <a href="{{ url_for('register') }}" class="cta-btn">Créer un compte</a>
        {% endif %}
    </div>

    <div class="burger" onclick="toggleMobileMenu(this)">
        <span></span>
        <span></span>
        <span></span>
    </div>
</nav>

<div id="mobileMenu" class="mobile-menu">
    <a href="{{ url_for('home') }}">Accueil</a>
    <a href="{{ url_for('pricing') }}">Offres</a>

    {% if current_user.is_authenticated %}
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('logout') }}" class="logout-btn">Déconnexion</a>
    {% else %}
        <a href="{{ url_for('login') }}">Connexion</a>
        <a href="{{ url_for('register') }}" class="cta-btn mobile-cta">Créer un compte</a>
    {% endif %}
</div>

<script>
function toggleMobileMenu(el) {
    el.classList.toggle("active");
    document.getElementById("mobileMenu").classList.toggle("active");
}
</script>
